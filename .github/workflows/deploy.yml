name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  # ── Шаг 1: Запускаем тесты ────────────────────────────────────────────────
  # Если тесты упали — деплой не запускается
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create test .env
        run: |
          cat > .env << 'EOF'
          TELEGRAM_BOT_TOKEN=fake_token
          TELEGRAM_CHAT_ID=123456
          WEDDING_DATE=2026-09-19T12:00:00
          SECRET_ADMIN_PASSWORD=changeme
          DATABASE_URL=sqlite:///./data/wedding.db
          EOF
          mkdir -p data

      - name: Run tests
        run: pytest tests/ -v

  # ── Шаг 2: Деплой на сервер (только если тесты прошли) ────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: test  # ← ждёт успешного завершения job "test"

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/wedding
            git stash
            git pull origin main
            sed -i 's/YOUR_DOMAIN/piletskigroup.ru/g' nginx.conf
            docker compose up -d --build app
            docker compose restart nginx
            echo "Deploy complete!"
