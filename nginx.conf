# ── HTTP: редирект на HTTPS + certbot challenge ──────────────────────────────
server {
    listen 80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Статика отдаётся напрямую Nginx
    location /static/ {
        alias /app/static/;
        expires 1d;
        add_header Cache-Control "public, must-revalidate";
    }

    # ── Uptime Kuma — панель мониторинга доступности ──────────────────────────
    # Доступна по https://YOUR_DOMAIN/uptime/
    location /uptime/ {
        auth_basic           "Monitoring";
        auth_basic_user_file /etc/nginx/.htpasswd;

        proxy_pass         http://uptime-kuma:3001/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Netdata — системные метрики сервера ───────────────────────────────────
    # Доступна по https://YOUR_DOMAIN/netdata/
    location /netdata/ {
        auth_basic           "Monitoring";
        auth_basic_user_file /etc/nginx/.htpasswd;

        proxy_pass         http://netdata:19999/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Всё остальное → FastAPI
    location / {
        proxy_pass         http://app:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
